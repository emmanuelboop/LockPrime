name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  client:
    name: Client lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: locked-vault-client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: locked-vault-client/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  server-unit:
    name: Server unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: locked-vault-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: locked-vault-server/package-lock.json

      - run: npm ci
      - run: npm run test:unit

  server-integration:
    name: Server integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: locked-vault-server

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: lockprime_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d lockprime_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/lockprime_test
      JWT_SECRET: ci-test-jwt-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: locked-vault-server/package-lock.json

      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run test:integration
